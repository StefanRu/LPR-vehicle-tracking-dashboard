<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LPR Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #262a33;
      --text: #e6e8eb;
      --muted: #8a93a0;
      --accent: #4cc38a;
      --warn: #e5a03a;
      --unknown: #777;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 0.85rem; }
    main { padding: 1.5rem 2rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 600;
      background: #13161c;
    }
    tr:last-child td { border-bottom: none; }
    .plate {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: #222733;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      display: inline-block;
    }
    .plate.known { background: #1d3a2a; color: var(--accent); }
    .name { color: var(--accent); font-weight: 500; }
    .name.unknown { color: var(--unknown); font-style: italic; }
    .status.on-site { color: var(--accent); }
    .status.left { color: var(--muted); }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
    .dash { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>License plate activity</h1>
    <div class="meta">
      <span id="generated">loading…</span>
      &middot;
      <span id="counts"></span>
    </div>
  </header>
  <main>
    <table>
      <thead>
        <tr>
          <th>Plate</th>
          <th>Name</th>
          <th>Arrived</th>
          <th>Left</th>
          <th>Duration</th>
          <th>Status</th>
          <th>Sightings</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="7" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    async function refresh() {
      try {
        const r = await fetch("/api/events");
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();

        document.getElementById("generated").textContent =
          "updated " + new Date(data.generated_at).toLocaleTimeString();
        document.getElementById("counts").textContent =
          `${data.vehicles.length} vehicles · ${data.raw_event_count} raw events · ${data.known_plate_count} known plates · last ${data.lookback_hours}h`;

        const tbody = document.getElementById("rows");
        if (!data.vehicles.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty">No license plate events in this window.</td></tr>';
          return;
        }
        tbody.innerHTML = data.vehicles.map(v => `
          <tr>
            <td><span class="plate ${v.known ? 'known' : ''}">${v.plate}</span></td>
            <td class="name ${v.known ? '' : 'unknown'}">${v.name || 'unknown'}</td>
            <td>${v.arrived_at_str || '<span class="dash">—</span>'}</td>
            <td>${v.left_at_str || '<span class="dash">—</span>'}</td>
            <td>${v.duration_str || '<span class="dash">—</span>'}</td>
            <td class="status ${v.status === 'on site' ? 'on-site' : 'left'}">${v.status}</td>
            <td>${v.sightings}</td>
          </tr>
        `).join("");
      } catch (e) {
        document.getElementById("rows").innerHTML =
          `<tr><td colspan="7" class="empty">Error: ${e.message}</td></tr>`;
      }
    }

    refresh();
    setInterval(refresh, 30_000); // refresh every 30s
  </script>
</body>
</html>
